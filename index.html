    async function saveIdCardAsImage(event, certId) {
        event.preventDefault();
        const cert = appData.certificates.idCards.find(c => c.id === certId);
        if (!cert) return;
        
        const tempContainer = document.createElement('div');
        tempContainer.style.position = 'absolute';
        tempContainer.style.left = '-9999px';
        document.body.appendChild(tempContainer);
        
        displayIdCard(certId, tempContainer.id);
        
        showToast('长按保存功能开发中，将以JSON格式下载证件信息。');
        const dataStr = JSON.stringify(cert, null, 2);
        const dataBlob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(dataBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `身份证_${cert.name}.json`;
        a.click();
        URL.revokeObjectURL(url);
        
        document.body.removeChild(tempContainer);
    }

    function applyFloatingScreenEffect() {
        const overlay = document.getElementById('floating-screen-overlay');
        const settings = appData.settings.beautify.floatingScreen;
        overlay.innerHTML = '';

        const currentPageId = pageHistory[pageHistory.length - 1];
        const shouldDisplay = 
            settings.displayArea === 'all' ||
            (settings.displayArea === 'home' && currentPageId === 'home-screen-page') ||
            (settings.displayArea === 'app' && currentPageId !== 'home-screen-page');

        if (settings.effect === 'none' || !shouldDisplay) {
            return;
        }

        let itemCount, itemClass, itemContent;
        switch (settings.effect) {
            case 'light_rain':
                itemCount = 50; itemClass = 'rain-drop'; itemContent = ''; break;
            case 'heavy_rain':
                itemCount = 150; itemClass = 'heavy-rain-drop'; itemContent = ''; break;
            case 'snow':
                itemCount = 100; itemClass = 'snowflake'; itemContent = '❄'; break;
            default: return;
        }

        for (let i = 0; i < itemCount; i++) {
            const item = document.createElement('div');
            item.className = `floating-item ${itemClass}`;
            item.innerHTML = itemContent;
            item.style.left = `${Math.random() * 100}%`;
            item.style.animationDuration = `${Math.random() * 3 + 2}s`;
            item.style.animationDelay = `${Math.random() * 5}s`;
            if (settings.effect === 'snow') {
                item.style.opacity = Math.random();
                item.style.fontSize = `${Math.random() * 10 + 10}px`;
            }
            overlay.appendChild(item);
        }
    }

        const smallText = document.getElementById('ins-now-playing-text');
        const currentTimeEl = document.getElementById('ins-current-time');
        const totalTimeEl = document.getElementById('ins-total-time');
        const progressEl = document.getElementById('ins-progress');

        if (song) {

            totalTimeEl.textContent = formatTime(totalTime);

    function formatTime(seconds) {

    }

    async function showHeartbeatModal(chatId) {
        const modalId = 'heartbeat-modal';
        const overlay = document.createElement('div');
        overlay.id = modalId;
        overlay.className = 'heartbeat-modal-overlay';
        overlay.innerHTML = `<div class="heartbeat-card"><div class="loader-container"><div class="loader"></div></div></div>`;

        overlay.onclick = () => overlay.remove();

        try {

            const chatHistory = contact.conversation.slice(-10).map(m => `${m.sender === appData.user.id ? appData.user.nickname : contact.name}: ${m.content.content}`).join('\n');
            const prompt = `你正在和'${appData.user.nickname}'聊天。请根据你的角色设定(${contact.persona})和最近的聊天记录，生成一句不超过100字的内心独白或真实想法。禁止任何括号、神态、动作或环境描写，只需纯粹的内心文字。\n\n聊天记录：\n${chatHistory}`;

    function editSingleMemberTitle(groupId, memberId) {
        const group = appData.groups.find(g => g.id == groupId);
        const member = memberId === 'user' ? appData.user : group.members.find(m => m.id == memberId);
        const currentTitle = group.groupTitles?.[memberId]?.title || '';
        const currentLevel = group.titlePoints?.[memberId]?.level || 0;

        const newTitle = prompt(`为 ${member.name || member.nickname} 设置新头衔 (6字以内):`, currentTitle);
        if (newTitle === null) return;
        
        let newLevel = currentLevel;
        if (memberId === group.ownerId.toString() || memberId === 'user') {
            const newLevelStr = prompt(`为 ${member.name || member.nickname} 设置等级 (0-100):`, currentLevel);
            if (newLevelStr === null) return;
            newLevel = parseInt(newLevelStr);
        }

        if (newTitle.length > 6) {
            showToast('头衔不能超过6个字', 'error');
            return;
        }
        if (isNaN(newLevel) || newLevel < 0 || newLevel > 100) {
            showToast('等级必须在0到100之间', 'error');
            return;
        }

        if (!group.groupTitles) group.groupTitles = {};
        if (!group.titlePoints) group.titlePoints = {};
        if (!group.titlePoints[memberId]) group.titlePoints[memberId] = { points: 0, level: 0, lastActivityDate: null };
        
        group.groupTitles[memberId] = { title: newTitle };
        group.titlePoints[memberId].level = newLevel;
        
        saveData(true);
        closeModal('edit-member-title-modal');
        showEditMemberTitleModal(groupId);
    }

    function updateGroupMemberPoints(groupId, memberId, pointsToAdd) {
        const group = appData.groups.find(g => g.id == groupId);
        if (!group) return;

        const today = new Date().toISOString().split('T')[0];
        const memberPoints = group.titlePoints[memberId];
        
        if (memberPoints.lastActivityDate !== today) {
            memberPoints.dailyPoints = 0;
        }

        const pointsCanAdd = Math.min(pointsToAdd, 30 - (memberPoints.dailyPoints || 0));
        if (pointsCanAdd > 0) {
            memberPoints.points += pointsCanAdd;
            memberPoints.dailyPoints = (memberPoints.dailyPoints || 0) + pointsCanAdd;
            memberPoints.lastActivityDate = today;
            
            const newLevel = Math.floor(memberPoints.points / 100);
            if (newLevel > memberPoints.level) {
                memberPoints.level = newLevel;
            }
            saveData();
        }
    }

    function handleDailyGroupActivity() {
        const today = new Date().toISOString().split('T')[0];
        appData.groups.forEach(group => {
            group.checkInData = {};
            
            Object.keys(group.titlePoints).forEach(memberId => {
                const memberData = group.titlePoints[memberId];
                if (memberData.lastActivityDate !== today && memberId !== group.ownerId.toString() && memberId !== 'user') {
                    let pointsToDeduct = 3;
                    if (memberData.level > 20 && memberData.level <= 60) pointsToDeduct = 5;
                    else if (memberData.level > 60) pointsToDeduct = 10;
                    
                    memberData.points = Math.max(0, memberData.points - pointsToDeduct);
                    memberData.level = Math.floor(memberData.points / 100);
                }
            });
        });
        saveData();
    }

    function performCheckIn(groupId) {
        const group = appData.groups.find(g => g.id == groupId);
        const today = new Date().toISOString().split('T')[0];
        if (!group.checkInData[today]) {
            group.checkInData[today] = [];
        }
        
        const todayCheckIns = group.checkInData[today];
        if (todayCheckIns.some(c => c.memberId === 'user')) {
            showToast('你今天已经打过卡了', 'error');
            return;
        }

        const isFirst = todayCheckIns.length === 0;
        const points = isFirst ? 3 : 1;
        
        todayCheckIns.push({
            memberId: 'user',
            name: appData.user.nickname,
            avatar: appData.user.avatar,
            time: Date.now()
        });

        updateGroupMemberPoints(groupId, 'user', points);
        
        const systemMsg = {
            id: Date.now(), type: 'system',
            content: { content: `${appData.user.nickname} 完成了今日打卡${isFirst ? '，是今日第一名！' : ''}` },
            timestamp: Date.now()
        };
        group.conversation.push(systemMsg);
        
        saveData();
        renderMessages(groupId, 'group', 'wechat');
        showToast(`打卡成功！获得 ${points} 积分。`);
    }

    function handleFileUpload(file, chatId, chatType, source) {
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                sendMessage(chatId, chatType, { 
                    name: file.name, 
                    size: file.size,
                    type: file.type,
                    dataUrl: event.target.result 
                }, 'file', source);
            };
            reader.readAsDataURL(file);
        }
    }

    function sendSimulatedFile(chatId, chatType, source) {
        const title = document.getElementById('sim-file-title').value.trim();
        const ext = document.getElementById('sim-file-ext').value;
        const content = document.getElementById('sim-file-content').value;

        if (!title || !content) {
            showToast('文件标题和内容不能为空', 'error');
            return;
        }

        const fileName = `${title}${ext}`;
        const blob = new Blob([content], { type: 'text/plain' });
        const dataUrl = URL.createObjectURL(blob); // Note: This URL is temporary

        sendMessage(chatId, chatType, {
            name: fileName,
            size: blob.size,
            type: 'text/plain',
            dataUrl: dataUrl, // We'll handle this differently on display
            simulatedContent: content // Store the actual content
        }, 'file', source);

        closeModal('text-file-sim-modal');
    }

            const newPreset = {
                name,
                provider: document.getElementById('voice-provider-select').value,
                apiKey: document.getElementById('voice-api-key').value,
                groupId: document.getElementById('voice-group-id').value,
                endpoint: document.getElementById('voice-endpoint').value
            };
            if (!appData.settings.voice.presets) appData.settings.voice.presets = [];
            appData.settings.voice.presets.push(newPreset);
            saveData(true, () => renderVoiceSettingsPage(document.getElementById('voice-settings-page')));
        }

        function deleteVoicePreset() {
            const select = document.getElementById('voice-preset-select');
            const index = select.value;
            if (index > -1) {
                if (confirm(`确定要删除预设 "${appData.settings.voice.presets[index].name}" 吗？`)) {
                    appData.settings.voice.presets.splice(index, 1);
                    saveData(true, () => renderVoiceSettingsPage(document.getElementById('voice-settings-page')));
                }
            } else {
                showToast('请先选择一个要删除的预设', 'error');
            }
        }

        function saveVoiceSettings() {
            const settings = appData.settings.voice;
            settings.provider = document.getElementById('voice-provider-select').value;
            settings.apiKey = document.getElementById('voice-api-key').value;
            settings.groupId = document.getElementById('voice-group-id').value;
            settings.endpoint = document.getElementById('voice-endpoint').value;
            saveData(true);
        }

        async function fetchVoices() {
            const settings = appData.settings.voice;
            settings.provider = document.getElementById('voice-provider-select').value;
            settings.apiKey = document.getElementById('voice-api-key').value;
            settings.groupId = document.getElementById('voice-group-id').value;
            
            let url, headers;
            switch (settings.provider) {
                case 'elevenlabs':
                    url = 'https://api.elevenlabs.io/v1/voices';
                    headers = { 'xi-api-key': settings.apiKey };
                    break;
                case 'minimax':
                    settings.voices = [
                        { id: 'male-magnetic-001', name: '青涩青年音', previewUrl: '' },
                        { id: 'male-deep-001', name: '成熟磁性男音', previewUrl: '' },
                        { id: 'female-professional-001', name: '知性女音', previewUrl: '' },
                        { id: 'female-sweet-001', name: '甜美少女音', previewUrl: '' },
                        { id: 'female-childlike-001', name: '软萌童声', previewUrl: '' },
                        { id: 'female-energetic-001', name: '活力御姐音', previewUrl: '' }
                    ];
                    saveData();
                    renderVoiceSettingsPage(document.getElementById('voice-settings-page'));
                    showToast('Minimax 官方音色已加载');
                    return;
                default:
                    showToast('该服务商暂不支持自动获取音色', 'error');
                    return;
            }

            try {
                const response = await fetch(url, { headers });
                if (!response.ok) throw new Error(`API 请求失败: ${response.status}`);
                const data = await response.json();
                
                settings.voices = data.voices.map(v => ({
                    id: v.voice_id,
                    name: v.name,
                    previewUrl: v.preview_url
                }));
                
                saveData();
                renderVoiceSettingsPage(document.getElementById('voice-settings-page'));
                showToast('音色列表获取成功！');
            } catch (e) {
                showToast(`获取音色失败: ${e.message}`, 'error');
                console.error('Fetch voices error:', e);
            }
        }

        function playVoicePreview(url, voiceId) {
            if (url) {
                const audio = new Audio(url);
                audio.play().catch(e => showToast('试听失败', 'error'));
            } else if (appData.settings.voice.provider === 'minimax') {
                playAiVoice('你好，这是我的声音，很高兴为你服务。', voiceId);
            } else {
                showToast('该音色无预览', 'info');
            }
        }

        async function playAiVoice(text, voiceId) {
            const settings = appData.settings.voice;
            if (!settings.apiKey) {
                showToast('语音API密钥未设置', 'error');
                return;
            }

            let url, headers, body;
            switch (settings.provider) {
                case 'elevenlabs':
                    url = `https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`;
                    headers = { 'Content-Type': 'application/json', 'xi-api-key': settings.apiKey };
                    body = JSON.stringify({ text: text, model_id: "eleven_multilingual_v2" });
                    break;
                case 'minimax':
                    if (!settings.groupId) {
                        showToast('Minimax 需要 Group ID', 'error');
                        return;
                    }
                    url = `https://api.minimax.chat/v1/text_to_speech?GroupId=${settings.groupId}`;
                    headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${settings.apiKey}` };
                    body = JSON.stringify({
                        voice_id: voiceId,
                        text: text,
                        model: "speech-01",
                        speed: 1.0,
                        vol: 1.0,
                        pitch: 0
                    });
                    break;
                case 'custom':
                    url = settings.endpoint;
                    headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${settings.apiKey}` };
                    body = JSON.stringify({ text: text, voice: voiceId }); // Example body, may need adjustment
                    break;
                default:
                    showToast('当前语音服务商不支持播放', 'error');
                    return;
            }

            try {
                const response = await fetch(url, { method: 'POST', headers, body });
                if (!response.ok) throw new Error(`语音生成失败: ${response.status} ${await response.text()}`);
                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                audio.play();
            } catch (e) {
                showToast(`语音播放失败: ${e.message}`, 'error');
                console.error('Play AI voice error:', e);
            }
        }

    </script>
